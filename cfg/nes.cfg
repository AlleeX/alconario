# -----------------------------------------------------------------------------
# ld65 linker config — NES, NROM-256 (mapper 0), horizontal mirroring
# 32 KiB PRG-ROM + 8 KiB CHR-ROM
# -----------------------------------------------------------------------------

MEMORY {
    # iNES header (16 bytes), emitted by the HEADER segment
    HEADER:  start = $0000, size = $0010, file = %O, fill = yes;

    # 32 KiB PRG-ROM, mapped at $8000-$FFFF
    PRG:     start = $8000, size = $8000, file = %O, fill = yes, define = yes;

    # 8 KiB CHR-ROM (pattern tables)
    CHR:     start = $0000, size = $2000, file = %O, fill = yes;

    # NES RAM
    ZP:      start = $0000, size = $0100, type = rw, define = yes;
    OAM:     start = $0200, size = $0100, type = rw, define = yes;
    RAM:     start = $0300, size = $0500, type = rw, define = yes;
}

SEGMENTS {
    HEADER:    load = HEADER,        type = ro;
    STARTUP:   load = PRG,           type = ro,  define = yes;
    LOWCODE:   load = PRG,           type = ro,  optional = yes;
    INIT:      load = PRG,           type = ro,  optional = yes;
    CODE:      load = PRG,           type = ro,  define = yes;
    RODATA:    load = PRG,           type = ro,  define = yes;
    DATA:      load = PRG, run = RAM, type = rw, define = yes;
    VECTORS:   load = PRG,           type = ro,  start = $FFFA;
    CHARS:     load = CHR,           type = ro;

    ZEROPAGE:  load = ZP,            type = zp;
    OAM:       load = OAM,           type = bss, define = yes;
    BSS:       load = RAM,           type = bss, define = yes;
}

FEATURES {
    CONDES: segment = INIT,
            type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__;
    CONDES: segment = RODATA,
            type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__;
}

SYMBOLS {
    __STACKSIZE__: type = weak, value = $0100;   # C stack size
}
